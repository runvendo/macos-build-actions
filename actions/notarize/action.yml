name: Notarize artifact
description: Submits a .app, .dmg, or .zip to Apple's notary service via xcrun notarytool, waits for the result, and on failure fetches the developer log URL.

inputs:
  artifact-path:
    description: Path to the .app, .dmg, or .zip to submit.
    required: true
  api-key-p8-base64:
    description: Base64-encoded App Store Connect API .p8 private key.
    required: true
  api-key-id:
    description: ASC API Key ID (10-char).
    required: true
  api-issuer-id:
    description: ASC API Issuer ID (UUID).
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
        API_KEY_B64: ${{ inputs.api-key-p8-base64 }}
        API_KEY_ID: ${{ inputs.api-key-id }}
        API_ISSUER_ID: ${{ inputs.api-issuer-id }}
      run: |
        set -euo pipefail
        ARTIFACT="$ARTIFACT_PATH"
        KEY_PATH="$RUNNER_TEMP/asc-key.p8"

        printf '%s' "$API_KEY_B64" | base64 --decode > "$KEY_PATH"

        # notarytool needs a zip if the artifact is a .app; .dmg submits directly.
        SUBMIT_PATH="$ARTIFACT"
        if [[ "$ARTIFACT" == *.app ]]; then
          SUBMIT_PATH="$RUNNER_TEMP/$(basename "$ARTIFACT").zip"
          ditto -c -k --keepParent "$ARTIFACT" "$SUBMIT_PATH"
        fi

        set +e
        OUT=$(xcrun notarytool submit "$SUBMIT_PATH" \
          --key "$KEY_PATH" \
          --key-id "$API_KEY_ID" \
          --issuer "$API_ISSUER_ID" \
          --wait --output-format json)
        STATUS=$?
        set -e

        echo "$OUT" | tee "$RUNNER_TEMP/notarize.json"

        emit_failure_summary() {
          local submission_id="$1"
          local status_label="$2"
          local log_file="$RUNNER_TEMP/notarize-log-${submission_id}.json"
          xcrun notarytool log "$submission_id" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            "$log_file" 2>/dev/null || true
          {
            echo "## Notarization failed"
            echo ""
            echo "- **Submission ID:** \`$submission_id\`"
            echo "- **Status:** \`$status_label\`"
            echo ""
            if [ -s "$log_file" ]; then
              echo "### notarytool log"
              echo ""
              echo '```json'
              cat "$log_file"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        }

        if [ "$STATUS" -ne 0 ]; then
          SUBMISSION_ID=$(echo "$OUT" | jq -r '.id // empty')
          if [ -n "$SUBMISSION_ID" ]; then
            echo "::error::Notarization failed. Submission: $SUBMISSION_ID"
            emit_failure_summary "$SUBMISSION_ID" "$(echo "$OUT" | jq -r '.status // "unknown"')"
          fi
          rm -f "$KEY_PATH"
          exit 1
        fi

        FINAL_STATUS=$(echo "$OUT" | jq -r '.status')
        if [ "$FINAL_STATUS" != "Accepted" ]; then
          SUBMISSION_ID=$(echo "$OUT" | jq -r '.id // empty')
          if [ -n "$SUBMISSION_ID" ]; then
            echo "::error::Notarization status was $FINAL_STATUS. Submission: $SUBMISSION_ID"
            emit_failure_summary "$SUBMISSION_ID" "$FINAL_STATUS"
          else
            echo "::error::Notarization status was $FINAL_STATUS"
          fi
          rm -f "$KEY_PATH"
          exit 1
        fi

        rm -f "$KEY_PATH"
